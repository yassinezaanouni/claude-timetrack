name: ClaudeTimeTrack
options:
  bundleIdPrefix: com.yassinezaanouni
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: ClaudeTimeTrack
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_LSUIElement: true
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ClaudeTimeTrack:
    type: application
    platform: macOS
    sources:
      - path: ClaudeTimeTrackApp.swift
      - path: Models
      - path: Services
      - path: State
      - path: Utilities
      - path: Views
    settings:
      base:
        INFOPLIST_KEY_LSUIElement: true
        PRODUCT_BUNDLE_IDENTIFIER: com.yassinezaanouni.claudetimetrack
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: ClaudeTimeTrack
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleName: ClaudeTimeTrack
        CFBundleDisplayName: ClaudeTimeTrack
        CFBundleIdentifier: com.yassinezaanouni.claudetimetrack
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: ClaudeTimeTrack
        LSMinimumSystemVersion: "14.0"
